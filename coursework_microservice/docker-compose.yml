version: '3.8'

networks:
  webproxy:
    driver: bridge

services:
  # 1. Nginx Proxy (с Let's Encrypt)
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - webproxy
    labels:
      - "com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy=true"

  # 2. Помощник для сертификатов
  letsencrypt-companion:
    image: nginxproxy/acme-companion:latest
    container_name: nginx-letsencrypt
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./nginx/certs:/etc/nginx/certs:rw
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - ./nginx/html:/usr/share/nginx/html
    environment:
      - DEFAULT_EMAIL=melnik3570@gmail.com
    networks:
      - webproxy

  # 3. Веб-лендинг
  website:
    image: nginx:alpine
    container_name: website
    restart: unless-stopped
    volumes:
      - ./website:/usr/share/nginx/html
    environment:
      - VIRTUAL_HOST=vebfortgbot.melnikno.bizml.ru
      - LETSENCRYPT_HOST=vebfortgbot.melnikno.bizml.ru
      - LETSENCRYPT_EMAIL=melnik3570@gmail.com
    networks:
      - webproxy
